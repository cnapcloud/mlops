apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: airflow-rayjob-role
rules:
  - apiGroups:
      - ray.io
    resources:
      - rayjobs
    verbs:
      - create
      - get
      - list
      - watch
      - delete
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: airflow-rayjob-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: airflow-rayjob-role
subjects:
  - kind: ServiceAccount
    name: airflow-worker
    namespace: mlops