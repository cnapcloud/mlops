
# MinIO Helm Chart Values for Standalone Deployment
mode: standalone

replicas: 1
drivesPerNode: 1
pools: 1

# Image 설정
image:
  repository: quay.io/minio/minio
  tag: RELEASE.2024-12-18T13-15-44Z
  pullPolicy: IfNotPresent

mcImage:
  repository: quay.io/minio/mc
  tag: RELEASE.2024-11-21T17-21-54Z
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  ingressClassName: ~
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1g"
  path: /
  hosts:
    - minio-api.cnapcloud.com
  tls:
    - secretName: cnapcloud.com-tls
      hosts:
        - minio-api.cnapcloud.com


## Console Ingress 설정
consoleIngress:
  enabled: true
  ingressClassName: nginx

  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"

  hosts:
    - minio.cnapcloud.com

  path: /

  tls:
    - secretName: cnapcloud.com-tls
      hosts:
        - minio.cnapcloud.com

## root 계정은 직접 Secret으로 관리하는 것이 안전
existingSecret: minio-root-secret

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 8Gi


service:
  type: ClusterIP
  port: "9000"

consoleService:
  type: ClusterIP
  port: "9001"

resources:
  requests:
    memory: 1Gi

securityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

## OIDC 그룹 매핑용 Policy
policies:
  - name: viewer
    statements:
      - resources:
          - "arn:aws:s3:::*"
        actions:
          - "s3:GetObject"
          - "s3:GetObjectVersion"
          - "s3:ListBucket"
          - "s3:ListAllMyBuckets"
          - "s3:GetBucketLocation"
  - name: editor
    statements:
      - resources:
          - "arn:aws:s3:::*"
        actions:
          - "s3:GetObject"
          - "s3:GetObjectVersion"
          - "s3:PutObject"
          - "s3:DeleteObject"
          - "s3:ListBucket"
          - "s3:ListAllMyBuckets"
          - "s3:GetBucketLocation"
          - "s3:ListBucketMultipartUploads"
          - "s3:ListMultipartUploadParts"
          - "s3:AbortMultipartUpload"
  - name: admin
    statements:
      - resources:
          - "arn:aws:s3:::*"
        actions:
          - "s3:*"

