# MLflow Helm Chart Values
# chart: community-charts/mlflow 1.8.1
# 구성: 내장 PostgreSQL + PVC artifact 스토리지

replicaCount: 1

image:
  repository: burakince/mlflow
  pullPolicy: IfNotPresent
  tag: ""

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: "100%"
    maxUnavailable: 0

extraEnvVars:
  MLFLOW_SERVER_ALLOWED_HOSTS: "*"

# ---------------------------------------------------------------------------
# Backend Store: 내장 PostgreSQL (Bitnami)
# ---------------------------------------------------------------------------
backendStore:
  databaseMigration: true
  databaseConnectionCheck: true

postgresql:
  enabled: true
  architecture: standalone
  image:
    repository: bitnamilegacy/postgresql
  primary:
    service:
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      existingClaim: postgresql-storage-pvc
  auth:
    username: "mlflow"
    password: "password"
    database: "mlflow"

# ---------------------------------------------------------------------------
# Artifact Root: PVC 스토리지
# ---------------------------------------------------------------------------
artifactRoot:
  proxiedArtifactStorage: true
  defaultArtifactRoot: "/mlflow/mlruns"
  defaultArtifactsDestination: "/mlflow/mlartifacts"

# ---------------------------------------------------------------------------
# PVC 마운트
# ---------------------------------------------------------------------------
extraVolumes:
  - name: mlflow-storage
    persistentVolumeClaim:
      claimName: mlflow-storage-pvc

extraVolumeMounts:
  - name: mlflow-storage
    mountPath: /mlflow

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  enabled: true
  type: ClusterIP
  port: 80
  containerPort: 5000

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  hosts:
    - host: mlflow.cnapcloud.com
      paths:
        - path: /
          pathType: ImplementationSpecific
#  tls:
#    - secretName: "mlflow-tls"
#      hosts:
#        - mlflow.cnapcloud.com

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# ---------------------------------------------------------------------------
# Logging / Telemetry
# ---------------------------------------------------------------------------
log:
  enabled: true
  level: info

telemetry:
  enabled: false

# ---------------------------------------------------------------------------
# Auth (기본 비활성)
# ---------------------------------------------------------------------------
auth:
  enabled: false
  adminUsername: admin
  adminPassword: password1234

# ---------------------------------------------------------------------------
# Probe
# ---------------------------------------------------------------------------
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 5